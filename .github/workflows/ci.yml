name: CI & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write

jobs:
  # ==========================================
  # JOB 1: Build & Test
  # ==========================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run tests
        run: ./gradlew test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/debug/*.apk  # ← APK, no JAR

  # ==========================================
  # JOB 2: Release automático (solo en push a main)
  # ==========================================
  release:
    name: Auto Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-apk          # ← mismo nombre que en upload
          path: app/build/outputs/apk/debug/

      - name: Calculate next version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          VERSION=${LAST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|major:"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; SHOULD_RELEASE=true
          elif echo "$COMMITS" | grep -qiE "^feat:|^feature:"; then
            MINOR=$((MINOR + 1)); PATCH=0; SHOULD_RELEASE=true
          elif echo "$COMMITS" | grep -qiE "^fix:"; then
            PATCH=$((PATCH + 1)); SHOULD_RELEASE=true
          else
            SHOULD_RELEASE=false
          fi

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        if: steps.version.outputs.should_release == 'true'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          BREAKING=$(git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" | grep -iE "BREAKING CHANGE|major:" || true)
          FEATURES=$(git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" | grep -iE "^- feat:|^- feature:" || true)
          FIXES=$(git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" | grep -iE "^- fix:" || true)

          CHANGELOG=""
          [ -n "$BREAKING" ] && CHANGELOG="${CHANGELOG}## 💥 Breaking Changes\n${BREAKING}\n\n"
          [ -n "$FEATURES" ] && CHANGELOG="${CHANGELOG}## ✨ New Features\n${FEATURES}\n\n"
          [ -n "$FIXES" ]    && CHANGELOG="${CHANGELOG}## 🐛 Bug Fixes\n${FIXES}\n\n"

          printf "$CHANGELOG" > changelog_body.md

      - name: Create Release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/*.apk   # ← APK
          body_path: changelog_body.md
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}